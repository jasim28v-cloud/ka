<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="hilltopads-site-verification" content="5eb623009b9d55080da5">
    <meta name="referrer" content="no-referrer-when-downgrade" />

    <title>SHADOW | LIVE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Cairo:wght@400;700&display=swap');
        
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: 'Cairo', sans-serif; }

        /* الهيدر العلوي (نفس الصورة) */
        .shadow-header {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 1000;
        }
        .logo-shadow { font-family: 'Orbitron'; font-style: italic; font-weight: 900; font-size: 20px; letter-spacing: 1px; }
        .level-badge { color: #00f2ff; font-family: 'Orbitron'; font-size: 10px; font-weight: bold; border-bottom: 1px solid #00f2ff; }

        /* حاوية الفيديوهات */
        .v-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .v-container::-webkit-scrollbar { display: none; }
        .v-slide { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* الأيقونات الجانبية (نفس الصورة) */
        .side-btns { position: absolute; left: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .btn-box { 
            width: 50px; height: 50px; background: rgba(0,0,0,0.5); border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-box i { font-size: 18px; }
        .btn-box span { font-size: 10px; margin-top: 2px; font-weight: bold; }

        /* شريط التحكم السفلي (الأبيض - نفس الصورة) */
        .nav-footer {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 92%; height: 65px; background: rgba(0,0,0,0.9);
            border-radius: 15px; display: flex; justify-content: space-around; align-items: center;
            padding: 0 10px; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { color: #555; font-size: 20px; }
        .nav-item.active { color: #00f2ff; }
        .add-master { 
            width: 50px; height: 45px; background: #fff; color: #000; 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px;
        }
    </style>
</head>
<body>

    <header class="shadow-header">
        <div class="logo-shadow">SHADØW</div>
        <div class="level-badge">LEVEL 34 (SHADOW_LORD)</div>
    </header>

    <main class="v-container" id="feed"></main>

    <nav class="nav-footer">
        <i class="fas fa-home nav-item"></i>
        <i class="fas fa-share-alt nav-item"></i>
        <div class="add-master" id="upload-btn"><i class="fas fa-plus"></i></div>
        <i class="fas fa-comment nav-item"></i>
        <i class="fas fa-th-large nav-item active"></i>
    </nav>

    <script>
        const firebaseConfig = { databaseURL: "https://forg-c693e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('videos').on('value', snap => {
            const container = document.getElementById('feed');
            const data = snap.val(); if(!data) return;
            container.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const div = document.createElement('div');
                div.className = 'v-slide';
                div.innerHTML = `
                    <video loop playsinline src="${data[id].url}"></video>
                    <div class="side-btns">
                        <div class="btn-box" onclick="like('${id}')"><i class="fas fa-heart"></i><span>${data[id].likes || 0}</span></div>
                        <div class="btn-box"><i class="fas fa-comment-dots"></i><span>TALK</span></div>
                        <div class="btn-box"><i class="fas fa-share"></i></div>
                    </div>
                `;
                container.appendChild(div);
            });
            initAutoPlay();
        });

        const uploader = cloudinary.createUploadWidget({ cloudName: "dfscughol", uploadPreset: "update_vk" }, (err, res) => {
            if (res.event === "success") db.ref('videos').push({ url: res.info.secure_url, likes: 0 });
        });
        document.getElementById('upload-btn').onclick = () => uploader.open();

        function initAutoPlay() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v.play(); else v.pause();
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-slide').forEach(s => obs.observe(s));
        }
        document.addEventListener('click', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, {once:true});
    </script>
</body>
</html>
