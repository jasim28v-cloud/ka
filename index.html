<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="hilltopads-site-verification" content="5eb623009b9d55080da5"> 

    <title>VITRUM | PURE BLACK</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+Arabic:wght@400;700&display=swap');
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Noto Sans Arabic', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* حاوية الفيديوهات - ملء الشاشة تماماً */
        .v-scroller {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .v-scroller::-webkit-scrollbar { display: none; }

        .v-frame {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* الطبقة العلوية - شفافة تماماً */
        .top-nav {
            position: absolute; top: 0; width: 100%; padding: 25px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }

        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 24px; color: #ff007f; text-shadow: 0 0 10px #ff007f; }

        /* أزرار التفاعل الجانبية - أنيقة وشفافة */
        .side-actions {
            position: absolute; right: 15px; bottom: 120px;
            display: flex; flex-direction: column; gap: 20px;
            z-index: 100;
        }

        .action-node {
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer;
        }

        .icon-box {
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; transition: 0.3s;
        }

        .action-node:active .icon-box { transform: scale(0.8); background: #ff007f; }

        .count-label { font-size: 12px; margin-top: 5px; font-weight: bold; }

        /* الشريط السفلي - تصميم عائم حديث */
        .bottom-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; height: 65px;
            background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px);
            border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }

        .center-add {
            width: 50px; height: 50px; background: #fff; color: #000;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

    <main class="v-scroller" id="main-feed"></main>

    <nav class="bottom-dock">
        <i class="fas fa-home text-white text-xl"></i>
        <div class="center-add" id="upload-btn"><i class="fas fa-plus"></i></div>
        <i class="fas fa-comment-dots text-white/40 text-xl" onclick="toggleChat(true)"></i>
    </nav>

    <div id="chat-layer" class="fixed inset-0 bg-black/98 z-[2000] hidden flex-col p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold">التعليقات</h2>
            <button onclick="toggleChat(false)" class="text-3xl">&times;</button>
        </div>
        <div id="chat-display" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="mt-4 flex gap-2">
            <input type="text" id="chat-input" class="flex-1 bg-white/10 rounded-full px-5 py-3 outline-none" placeholder="أضف تعليقاً...">
            <button onclick="pushMsg()" class="bg-[#ff007f] px-6 py-3 rounded-full font-bold">نشر</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://forg-c693e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('videos').on('value', snap => {
            const feed = document.getElementById('main-feed');
            const data = snap.val(); if(!data) return;
            feed.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const section = document.createElement('section');
                section.className = 'v-frame';
                section.innerHTML = `
                    <div class="top-nav">
                        <span class="logo">VITRUM</span>
                        <i class="fas fa-search opacity-50"></i>
                    </div>
                    <video loop playsinline src="${data[id].url}"></video>
                    <div class="side-actions">
                        <div class="action-node" onclick="likeVideo('${id}')">
                            <div class="icon-box"><i class="fas fa-heart text-white"></i></div>
                            <span class="count-label">${data[id].likes || 0}</span>
                        </div>
                        <div class="action-node" onclick="toggleChat(true)">
                            <div class="icon-box"><i class="fas fa-comment-dots"></i></div>
                            <span class="count-label">ردود</span>
                        </div>
                    </div>
                `;
                feed.appendChild(section);
            });
            initObserver();
        });

        const uploader = cloudinary.createUploadWidget({ cloudName: "dfscughol", uploadPreset: "update_vk" }, (e, r) => {
            if (r.event === "success") db.ref('videos').push({ url: r.info.secure_url, likes: 0 });
        });
        document.getElementById('upload-btn').onclick = () => uploader.open();

        function likeVideo(id) { db.ref(`videos/${id}/likes`).transaction(c => (c || 0) + 1); }
        function toggleChat(s) { document.getElementById('chat-layer').classList.toggle('hidden', !s); }
        
        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v.play(); else v.pause();
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-frame').forEach(f => obs.observe(f));
        }

        document.addEventListener('click', () => { 
            document.querySelectorAll('video').forEach(v => v.muted = false); 
        }, {once:true});
    </script>
</body>
</html>
