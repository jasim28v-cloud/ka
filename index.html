<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="hilltopads-site-verification" content="5eb623009b9d55080da5"> <title>VITRUM | THE GLASS PROTOCOL 2027</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@200;700&display=swap');
        :root { --glass-pink: #ff007f; --neon-rose: #ff85c0; --deep-void: #0a010a; }
        
        body { margin: 0; background: var(--deep-void); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; }
        
        /* مشغل الفيديوهات الرأسي */
        .v-scroller { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; background: #000; }
        .v-scroller::-webkit-scrollbar { display: none; }
        
        .v-frame { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        
        .video-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD: الواجهة العلوية الزجاجية */
        .top-hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 40px 20px;
            background: linear-gradient(to bottom, rgba(255,0,127,0.2) 0%, transparent 100%);
            z-index: 100; backdrop-filter: blur(8px); display: flex; justify-content: space-between; align-items: center;
        }
        .brand-logo { font-family: 'Orbitron'; font-weight: 900; font-size: 26px; color: #fff; text-shadow: 0 0 20px var(--glass-pink); letter-spacing: 4px; }

        /* أزرار التفاعل الجانبية */
        .side-interface { position: absolute; left: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .node-circle { 
            width: 56px; height: 56px; background: rgba(255,255,255,0.08); backdrop-filter: blur(15px);
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,0,127,0.3); font-size: 24px; transition: 0.3s;
        }
        .node-text { font-size: 10px; text-align: center; margin-top: 4px; font-family: 'Orbitron'; color: var(--neon-rose); font-weight: 900; }

        /* شريط التحكم السفلي */
        .dock-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px; height: 75px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px);
            border-radius: 30px; border: 1px solid rgba(255,0,127,0.2);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .center-portal { 
            width: 65px; height: 45px; background: #fff; color: #000; 
            border-radius: 15px; display: flex; align-items: center; justify-content: center; 
            font-size: 22px; cursor: pointer; box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        #chat-layer { position: fixed; inset: 0; background: rgba(10,1,10,0.98); z-index: 2000; display: none; padding: 30px; border-top: 2px solid var(--glass-pink); }
    </style>
</head>
<body>

    <main class="v-scroller" id="main-feed"></main>

    <nav class="dock-bar">
        <i class="fas fa-th-large text-white/40 text-xl"></i>
        <i class="fas fa-ghost text-white/40 text-xl"></i>
        <div class="center-portal" id="upload-btn"><i class="fas fa-plus"></i></div>
        <i class="fas fa-comment-alt text-white/40 text-xl" onclick="toggleChat(true)"></i>
        <i class="fas fa-user-circle text-white/40 text-xl"></i>
    </nav>

    <div id="chat-layer" class="flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black text-xl font-[Orbitron] text-[var(--neon-rose)]">VITRUM_CHAT</h2>
            <i class="fas fa-times text-2xl" onclick="toggleChat(false)"></i>
        </div>
        <div id="chat-display" class="flex-1 overflow-y-auto space-y-4 mb-4"></div>
        <div class="flex gap-2 p-2 bg-white/5 rounded-xl border border-pink-500/20">
            <input type="text" id="chat-input" class="flex-1 bg-transparent p-2 outline-none text-pink-100" placeholder="ارسل إشارة...">
            <button onclick="pushMsg()" class="px-8 py-2 bg-[var(--glass-pink)] rounded-lg font-bold">إرسال</button>
        </div>
    </div>

    <script>
        // [DATABASE_CONNECTION]
        const firebaseConfig = { databaseURL: "https://forg-c693e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // [FEED_INJECTION]
        db.ref('videos').on('value', snap => {
            const feed = document.getElementById('main-feed');
            const data = snap.val(); if(!data) return;
            feed.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const section = document.createElement('section');
                section.className = 'v-frame';
                section.dataset.id = id;
                section.innerHTML = `
                    <div class="top-hud"><div class="brand-logo">VITRUM</div></div>
                    <div class="video-wrapper"><video loop playsinline src="${data[id].url}"></video></div>
                    <div class="side-interface">
                        <div onclick="likeAction('${id}')">
                            <div class="node-circle"><i class="fas fa-heart text-pink-500"></i></div>
                            <div class="node-text">${data[id].likes || 0}</div>
                        </div>
                        <div onclick="toggleChat(true)">
                            <div class="node-circle"><i class="fas fa-comment-dots text-white"></i></div>
                            <div class="node-text">CHAT</div>
                        </div>
                    </div>
                `;
                feed.appendChild(section);
            });
            initObserver();
        });

        // [UPLINK_PROTOCOL]
        const uploader = cloudinary.createUploadWidget({ 
            cloudName: "dfscughol", 
            uploadPreset: "update_vk" 
        }, (err, res) => {
            if (!err && res && res.event === "success") {
                db.ref('videos').push({ url: res.info.secure_url, likes: 0 });
            }
        });
        document.getElementById('upload-btn').onclick = () => uploader.open();

        function likeAction(id) { db.ref(`videos/${id}/likes`).transaction(c => (c || 0) + 1); }
        function toggleChat(s) { document.getElementById('chat-layer').style.display = s ? 'flex' : 'none'; }

        function initObserver() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v.play(); else v.pause();
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-frame').forEach(f => observer.observe(f));
        }

        document.addEventListener('touchstart', () => { 
            document.querySelectorAll('video').forEach(v => v.muted = false); 
        }, {once:true});
    </script>
</body>
</html>
