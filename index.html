    <title>VITRUM | THE GLASS PROTOCOL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@200;700&display=swap');
        :root { --glass-pink: #ff007f; --neon-rose: #ff85c0; --deep-void: #0a010a; }
        
        body { margin: 0; background: var(--deep-void); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; }
        
        /* مشغل الفيديوهات الرأسي (Tiktok Style) */
        .v-scroller { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; background: #000; }
        .v-scroller::-webkit-scrollbar { display: none; }
        
        .v-frame { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(255,0,127,0.1); }
        
        .video-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD: واجهة المعلومات العلوية */
        .top-hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 40px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 100; display: flex; justify-content: space-between; align-items: center;
        }
        .brand-logo { font-family: 'Orbitron'; font-weight: 900; font-size: 24px; color: #fff; text-shadow: 0 0 15px var(--glass-pink); letter-spacing: 3px; }

        /* واجهة التفاعل الجانبية */
        .side-interface { position: absolute; left: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .node-circle { 
            width: 55px; height: 55px; background: rgba(255,255,255,0.08); backdrop-filter: blur(15px);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1); font-size: 22px; transition: 0.3s;
        }
        .node-text { font-size: 11px; text-align: center; margin-top: 4px; font-family: 'Orbitron'; color: var(--neon-rose); }

        /* شريط التحكم السفلي (Dock) */
        .dock-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 70px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px);
            border-radius: 25px; border: 1px solid rgba(255,0,127,0.2);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .center-portal { 
            width: 60px; height: 40px; background: #fff; color: #000; 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            font-size: 20px; cursor: pointer; transition: 0.3s;
        }
        .center-portal:active { transform: scale(0.9); background: var(--glass-pink); color: #fff; }

        /* واجهة الدردشة الزجاجية */
        #chat-layer { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; padding: 25px; }
    </style>
</head>
<body>

    <a href="jasim28v-cloud.github.io/d3380b0969bc8e814852.txt" style="display:none;">VERIFY_FILE</a>

    <main class="v-scroller" id="main-feed">
        </main>

    <nav class="dock-bar">
        <i class="fas fa-home text-white text-xl"></i>
        <i class="fas fa-search text-white/40 text-xl"></i>
        <div class="center-portal" id="upload-btn"><i class="fas fa-plus"></i></div>
        <i class="fas fa-comment-dots text-white/40 text-xl" onclick="toggleChat(true)"></i>
        <i class="fas fa-user-circle text-white/40 text-xl"></i>
    </nav>

    <div id="chat-layer" class="flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black text-xl text-[var(--neon-rose)]">NEURAL_CHAT</h2>
            <i class="fas fa-times text-2xl" onclick="toggleChat(false)"></i>
        </div>
        <div id="chat-display" class="flex-1 overflow-y-auto space-y-4 mb-4"></div>
        <div class="flex gap-2 p-2 bg-white/5 rounded-xl border border-white/10">
            <input type="text" id="chat-input" class="flex-1 bg-transparent p-2 outline-none" placeholder="Transmit...">
            <button onclick="pushMsg()" class="px-6 py-2 bg-[var(--glass-pink)] rounded-lg font-bold">SEND</button>
        </div>
    </div>

    <script>
        // 1. إعدادات Firebase
        const firebaseConfig = { databaseURL: "https://forg-c693e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. جلب الفيديوهات من Firebase وبناء الواجهة
        db.ref('videos').on('value', snap => {
            const feed = document.getElementById('main-feed');
            const data = snap.val(); if(!data) return;
            feed.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const section = document.createElement('section');
                section.className = 'v-frame';
                section.dataset.id = id;
                section.innerHTML = `
                    <div class="top-hud">
                        <div class="brand-logo">VITRUM</div>
                        <i class="fas fa-ellipsis-v text-white/50"></i>
                    </div>
                    <div class="video-wrapper">
                        <video loop playsinline src="${data[id].url}"></video>
                    </div>
                    <div class="side-interface">
                        <div onclick="likeAction('${id}')">
                            <div class="node-circle"><i class="fas fa-heart text-pink-500"></i></div>
                            <div class="node-text">${data[id].likes || 0}</div>
                        </div>
                        <div onclick="toggleChat(true)">
                            <div class="node-circle"><i class="fas fa-comment-dots text-white"></i></div>
                            <div class="node-text">CHAT</div>
                        </div>
                        <div onclick="shareAction('${data[id].url}')">
                            <div class="node-circle"><i class="fas fa-paper-plane text-white"></i></div>
                            <div class="node-text">PUSH</div>
                        </div>
                    </div>
                `;
                feed.appendChild(section);
            });
            initObserver(); // تشغيل ميزة التشغيل التلقائي عند التمرير
        });

        // 3. نظام الرفع السحابي (Cloudinary)
        const uploader = cloudinary.createUploadWidget({ 
            cloudName: "dfscughol", 
            uploadPreset: "update_vk" 
        }, (error, result) => {
            if (!error && result && result.event === "success") { 
                db.ref('videos').push({ url: result.info.secure_url, likes: 0, time: Date.now() });
            }
        });
        document.getElementById('upload-btn').onclick = () => uploader.open();

        // 4. وظائف التفاعل
        function likeAction(id) {
            db.ref(`videos/${id}/likes`).transaction(c => (c || 0) + 1);
        }

        function shareAction(url) {
            navigator.clipboard.writeText(url);
            alert("تم نسخ رابط الفيديو الزجاجي!");
        }

        function toggleChat(show) {
            document.getElementById('chat-layer').style.display = show ? 'flex' : 'none';
        }

        // 5. التحكم في الفيديو (Auto-Play/Pause)
        let currentVideoID = null;
        function initObserver() {
            const options = { threshold: 0.7 };
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if(entry.isIntersecting) {
                        video.play();
                        currentVideoID = entry.target.dataset.id;
                    } else {
                        video.pause();
                    }
                });
            }, options);
            document.querySelectorAll('.v-frame').forEach(frame => observer.observe(frame));
        }

        // تفعيل الصوت عند أول لمسة
        document.addEventListener('click', () => {
            document.querySelectorAll('video').forEach(v => v.muted = false);
        }, {once: true});
    </script>
</body>
</html>
