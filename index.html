<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="hilltopads-site-verification" content="5eb623009b9d55080da5">
    <meta name="referrer" content="no-referrer-when-downgrade" />

    <title>VITRUM | FULL IMMERSION</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+Arabic:wght@300;800&display=swap');
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Noto Sans Arabic', sans-serif;
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
        }

        /* التمرير العمودي الكامل */
        .v-scroller {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .v-scroller::-webkit-scrollbar { display: none; }

        .v-frame {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }

        /* الفيديو يملأ الشاشة تماماً */
        video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; /* لضمان ملء الشاشة دون تشويه */
        }

        /* الشعار العلوي - أنيق وشفاف */
        .header-brand {
            position: absolute; top: 20px; left: 20px;
            z-index: 100; font-family: 'Orbitron';
            font-size: 20px; font-weight: 900;
            letter-spacing: 3px; color: #fff;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.8);
        }

        /* الأزرار الجانبية - بتصميم شفاف جداً */
        .side-stack {
            position: absolute; right: 12px; bottom: 100px;
            display: flex; flex-direction: column; gap: 20px; z-index: 100;
        }

        .btn-unit {
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
        }

        .icon-wrap {
            width: 45px; height: 45px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .val-text { font-size: 10px; margin-top: 4px; font-weight: 800; color: #fff; }

        /* شريط التنقل السفلي - مخفي جزئياً لتعزيز حجم الفيديو */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: 80px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }

        .upload-portal {
            width: 45px; height: 35px; background: #fff; color: #000;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        /* معلومات الفيديو أسفل اليسار */
        .video-meta {
            position: absolute; bottom: 90px; left: 15px;
            max-width: 75%; z-index: 100;
        }
        .v-title { font-weight: 800; font-size: 16px; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <main class="v-scroller" id="main-feed"></main>

    <div class="header-brand">VITRUM</div>

    <nav class="bottom-nav">
        <i class="fas fa-home text-white text-xl"></i>
        <div class="upload-portal" id="upload-btn"><i class="fas fa-plus"></i></div>
        <i class="fas fa-comment-dots text-white/50 text-xl" onclick="toggleChat(true)"></i>
    </nav>

    <div id="chat-layer" class="fixed inset-0 bg-black/95 z-[2000] hidden flex-col p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold">REPLIES</h2>
            <i class="fas fa-times text-2xl opacity-50" onclick="toggleChat(false)"></i>
        </div>
        <div id="chat-display" class="flex-1 overflow-y-auto"></div>
        <div class="mt-4 flex gap-2">
            <input type="text" id="chat-input" class="flex-1 bg-white/10 rounded-full px-5 py-3 outline-none" placeholder="قل شيئاً...">
            <button onclick="pushMsg()" class="bg-[#ff007f] px-6 py-3 rounded-full font-bold">ارسل</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://forg-c693e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('videos').on('value', snap => {
            const feed = document.getElementById('main-feed');
            const data = snap.val(); if(!data) return;
            feed.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const section = document.createElement('section');
                section.className = 'v-frame';
                section.innerHTML = `
                    <video loop playsinline src="${data[id].url}"></video>
                    <div class="video-meta">
                        <div class="v-title">@User_${id.substring(1,5)}</div>
                        <p class="text-sm opacity-80">محتوى حصري على منصة VITRUM ✨</p>
                    </div>
                    <div class="side-stack">
                        <div class="btn-unit" onclick="likeVideo('${id}')">
                            <div class="icon-wrap"><i class="fas fa-heart text-white"></i></div>
                            <span class="val-text">${data[id].likes || 0}</span>
                        </div>
                        <div class="btn-unit" onclick="toggleChat(true)">
                            <div class="icon-wrap"><i class="fas fa-comment-dots"></i></div>
                            <span class="val-text">CHAT</span>
                        </div>
                    </div>
                `;
                feed.appendChild(section);
            });
            initObserver();
        });

        const uploader = cloudinary.createUploadWidget({ cloudName: "dfscughol", uploadPreset: "update_vk" }, (e, r) => {
            if (r.event === "success") db.ref('videos').push({ url: r.info.secure_url, likes: 0 });
        });
        document.getElementById('upload-btn').onclick = () => uploader.open();

        function likeVideo(id) { db.ref(`videos/${id}/likes`).transaction(c => (c || 0) + 1); }
        function toggleChat(s) { document.getElementById('chat-layer').classList.toggle('hidden', !s); }
        
        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v.play(); else v.pause();
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-frame').forEach(f => obs.observe(f));
        }

        document.addEventListener('click', () => { 
            document.querySelectorAll('video').forEach(v => v.muted = false); 
        }, {once:true});
    </script>
</body>
</html>
